<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - HomeHeros</title>
  <link rel="icon" href="https://homeheros.ca/favicon.ico" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
        Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      background: linear-gradient(135deg, #f5f7f0 0%, #e8edd8 100%);
      color: #212121;
    }
    .container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(74, 93, 35, 0.15);
      padding: 40px 32px;
      width: 100%;
      max-width: 440px;
    }
    .logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo-text {
      font-size: 24px;
      font-weight: 700;
      color: #4A5D23;
      letter-spacing: -0.5px;
    }
    .icon {
      text-align: center;
      font-size: 56px;
      margin-bottom: 16px;
    }
    h1 {
      text-align: center;
      color: #4A5D23;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      color: #757575;
      font-size: 15px;
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #212121;
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #E0E0E0;
      border-radius: 10px;
      font-size: 16px;
      background: #FAFAFA;
      transition: border-color 0.2s;
      outline: none;
    }
    input[type="password"]:focus {
      border-color: #4A5D23;
      background: #ffffff;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #4A5D23;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    button:hover:not(:disabled) { background: #3A4A1C; }
    button:disabled { background: #BDBDBD; cursor: not-allowed; }
    .message {
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 16px;
      font-size: 14px;
      display: none;
    }
    .message.success {
      background: #E8F5E9;
      color: #2E7D32;
      border: 1px solid #A5D6A7;
      display: block;
    }
    .message.error {
      background: #FFEBEE;
      color: #C62828;
      border: 1px solid #EF9A9A;
      display: block;
    }
    .info {
      text-align: center;
      color: #9E9E9E;
      font-size: 13px;
      margin-top: 20px;
      line-height: 1.5;
    }
    .info a {
      color: #4A5D23;
      font-weight: 600;
      text-decoration: none;
    }
    .info a:hover { text-decoration: underline; }
    .hint {
      font-size: 12px;
      color: #9E9E9E;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <div class="logo-text">HomeHeros</div>
      </div>

      <div class="icon">🔐</div>
      <h1>Reset Your Password</h1>
      <p class="subtitle">Enter a new password for your account below.</p>

      <div id="message" class="message"></div>

      <form id="resetForm" autocomplete="off">
        <div class="form-group">
          <label for="password">New Password</label>
          <input
            type="password"
            id="password"
            name="password"
            required
            minlength="6"
            placeholder="At least 6 characters"
            autocomplete="new-password"
          />
          <div class="hint">Must be at least 6 characters.</div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            required
            minlength="6"
            placeholder="Re-enter your new password"
            autocomplete="new-password"
          />
        </div>

        <button type="submit" id="submitBtn">Reset Password</button>
      </form>

      <p class="info">
        Remember your password?
        <a href="https://homeheros.ca">Back to HomeHeros</a>
      </p>
    </div>
  </div>

  <!-- Supabase JS client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ==============================================================
    // Supabase configuration (safe to expose - anon key is public)
    // ==============================================================
    const SUPABASE_URL = 'https://vttzuaerdwagipyocpha.supabase.co';
    const SUPABASE_ANON_KEY =
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0dHp1YWVyZHdhZ2lweW9jcGhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg0Nzc1NDMsImV4cCI6MjA3NDA1MzU0M30.-QyK-_-jrVowVoMFy8IpCeVaeP59VNUCZtRmTD6Pfwc';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        autoRefreshToken: false,
        persistSession: false,
        detectSessionInUrl: true,
      },
    });

    const messageEl = document.getElementById('message');
    const formEl = document.getElementById('resetForm');
    const submitBtn = document.getElementById('submitBtn');

    function showMessage(text, type) {
      messageEl.textContent = text;
      messageEl.className = 'message ' + type;
    }

    function clearMessage() {
      messageEl.className = 'message';
      messageEl.textContent = '';
    }

    // ==============================================================
    // On page load: Supabase auto-detects recovery token in URL hash
    // ==============================================================
    (async () => {
      try {
        // Small delay lets Supabase parse the URL
        await new Promise((r) => setTimeout(r, 300));
        const { data: { session } } = await sb.auth.getSession();

        if (!session) {
          showMessage(
            'This password reset link is invalid or has expired. Please request a new link from the app.',
            'error'
          );
          submitBtn.disabled = true;
        }
      } catch (err) {
        console.error(err);
        showMessage(
          'Unable to verify reset link. Please try again or request a new link.',
          'error'
        );
        submitBtn.disabled = true;
      }
    })();

    // ==============================================================
    // Submit handler
    // ==============================================================
    formEl.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessage();

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password.length < 6) {
        showMessage('Password must be at least 6 characters.', 'error');
        return;
      }

      if (password !== confirmPassword) {
        showMessage('Passwords do not match.', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Updating…';

      try {
        const { error } = await sb.auth.updateUser({ password });

        if (error) {
          showMessage(error.message || 'Failed to update password.', 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Reset Password';
          return;
        }

        // Success — sign out the temporary recovery session
        await sb.auth.signOut();

        formEl.style.display = 'none';
        showMessage(
          '✅ Your password has been reset successfully. You can now sign in to the HomeHeros app with your new password.',
          'success'
        );
      } catch (err) {
        console.error(err);
        showMessage('An unexpected error occurred. Please try again.', 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>
