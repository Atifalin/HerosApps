<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Assignment - HomeHeros Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .stat-card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            color: #FF6B35;
        }

        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .jobs-section, .heroes-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-height: calc(100vh - 300px);
            overflow-y: auto;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .section-header h2 {
            color: #333;
        }

        .refresh-btn {
            padding: 8px 16px;
            background: #FF6B35;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .refresh-btn:hover {
            background: #e55a2b;
        }

        .job-card {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: move;
            transition: all 0.2s;
        }

        .job-card:hover {
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .job-card.dragging {
            opacity: 0.5;
        }

        .job-card.assigned {
            background: #d4edda;
            border-color: #28a745;
        }

        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .job-title {
            font-weight: 600;
            color: #333;
            font-size: 16px;
        }

        .job-id {
            font-size: 12px;
            color: #666;
            font-family: monospace;
        }

        .job-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .job-detail {
            font-size: 13px;
            color: #555;
        }

        .job-detail strong {
            color: #333;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge.requested {
            background: #FFF3CD;
            color: #856404;
        }

        .badge.assigned {
            background: #D4EDDA;
            color: #155724;
        }

        .hero-card {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            transition: all 0.2s;
        }

        .hero-card.drag-over {
            background: #e3f2fd;
            border-color: #2196F3;
            border-style: dashed;
        }

        .hero-card:hover {
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .hero-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .hero-avatar {
            width: 48px;
            height: 48px;
            border-radius: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            margin-right: 12px;
        }

        .hero-info {
            flex: 1;
        }

        .hero-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .hero-rating {
            font-size: 13px;
            color: #666;
        }

        .hero-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #e0e0e0;
        }

        .hero-stat {
            font-size: 12px;
            color: #555;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 18px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            z-index: 2000;
            display: none;
        }

        .toast.success {
            background: #28a745;
        }

        .toast.error {
            background: #dc3545;
        }

        .toast.active {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .assigned-hero {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .assigned-hero-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .assigned-hero-avatar {
            width: 32px;
            height: 32px;
            border-radius: 16px;
            background: #2196F3;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 12px;
        }

        .unassign-btn {
            padding: 4px 12px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .unassign-btn:hover {
            background: #c82333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Job Assignment Dashboard</h1>
            <p>Drag and drop jobs onto heroes to assign service providers</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>Unassigned Jobs</h3>
                <div class="number" id="unassignedCount">0</div>
            </div>
            <div class="stat-card">
                <h3>Assigned Jobs</h3>
                <div class="number" id="assignedCount">0</div>
            </div>
            <div class="stat-card">
                <h3>Available Heroes</h3>
                <div class="number" id="heroCount">0</div>
            </div>
        </div>

        <div class="main-content">
            <div class="jobs-section">
                <div class="section-header">
                    <h2>Open Jobs</h2>
                    <button class="refresh-btn" onclick="loadJobs()">🔄 Refresh</button>
                </div>
                <div id="jobsContainer" class="loading">
                    Loading jobs...
                </div>
            </div>

            <div class="heroes-section">
                <div class="section-header">
                    <h2>Available Heroes</h2>
                    <button class="refresh-btn" onclick="loadHeroes()">🔄 Refresh</button>
                </div>
                <div id="heroesContainer" class="loading">
                    Loading heroes...
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://vttzuaerdwagipyocpha.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0dHp1YWVyZHdhZ2lweW9jcGhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg0Nzc1NDMsImV4cCI6MjA3NDA1MzU0M30.-QyK-_-jrVowVoMFy8IpCeVaeP59VNUCZtRmTD6Pfwc';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let jobs = [];
        let heroes = [];

        // Initialize
        async function init() {
            await loadJobs();
            await loadHeroes();
        }

        // Load jobs from Supabase
        async function loadJobs() {
            const container = document.getElementById('jobsContainer');
            container.className = 'loading';
            container.innerHTML = 'Loading jobs...';

            try {
                const { data, error } = await supabase
                    .from('bookings')
                    .select(`
                        *,
                        services (title),
                        service_variants (name),
                        addresses (street, city, postal_code),
                        heros:fk_bookings_hero (id, name)
                    `)
                    .in('status', ['requested', 'awaiting_hero_accept'])
                    .order('created_at', { ascending: false });

                if (error) throw error;

                jobs = data || [];
                renderJobs();
                updateStats();
            } catch (error) {
                console.error('Error loading jobs:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>Error loading jobs</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        // Load heroes from Supabase
        async function loadHeroes() {
            const container = document.getElementById('heroesContainer');
            container.className = 'loading';
            container.innerHTML = 'Loading heroes...';

            try {
                const { data, error } = await supabase
                    .from('heros')
                    .select('*')
                    .eq('status', 'active')
                    .eq('verification_status', 'verified')
                    .order('rating_avg', { ascending: false });

                if (error) throw error;

                heroes = data || [];
                renderHeroes();
                updateStats();
            } catch (error) {
                console.error('Error loading heroes:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>Error loading heroes</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        // Render jobs
        function renderJobs() {
            const container = document.getElementById('jobsContainer');
            
            if (jobs.length === 0) {
                container.className = '';
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No open jobs</h3>
                        <p>All jobs have been assigned or completed</p>
                    </div>
                `;
                return;
            }

            container.className = '';
            container.innerHTML = jobs.map(job => renderJobCard(job)).join('');

            // Add drag event listeners
            document.querySelectorAll('.job-card').forEach(card => {
                card.addEventListener('dragstart', handleDragStart);
                card.addEventListener('dragend', handleDragEnd);
            });
        }

        // Render job card
        function renderJobCard(job) {
            const isAssigned = job.hero_id !== null;
            const scheduledDate = new Date(job.scheduled_at);
            
            return `
                <div class="job-card ${isAssigned ? 'assigned' : ''}" 
                     draggable="true" 
                     data-job-id="${job.id}">
                    <div class="job-header">
                        <div>
                            <div class="job-title">${job.service_name || job.services?.title || 'Service'}</div>
                            <div class="job-id">#${job.id.slice(-8)}</div>
                        </div>
                        <span class="badge ${isAssigned ? 'assigned' : 'requested'}">
                            ${isAssigned ? 'Assigned' : 'Unassigned'}
                        </span>
                    </div>
                    <div class="job-details">
                        <div class="job-detail">
                            <strong>📅</strong> ${scheduledDate.toLocaleDateString()}
                        </div>
                        <div class="job-detail">
                            <strong>⏰</strong> ${scheduledDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                        </div>
                        <div class="job-detail">
                            <strong>📍</strong> ${job.addresses?.city || 'N/A'}
                        </div>
                        <div class="job-detail">
                            <strong>💰</strong> $${(job.price_cents / 100).toFixed(2)}
                        </div>
                    </div>
                    ${isAssigned && job.heros ? `
                        <div class="assigned-hero">
                            <div class="assigned-hero-info">
                                <div class="assigned-hero-avatar">
                                    ${job.heros.name.split(' ').map(n => n[0]).join('')}
                                </div>
                                <span>${job.heros.name}</span>
                            </div>
                            <button class="unassign-btn" onclick="unassignJob('${job.id}')">
                                Unassign
                            </button>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        // Render heroes
        function renderHeroes() {
            const container = document.getElementById('heroesContainer');
            
            if (heroes.length === 0) {
                container.className = '';
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No heroes available</h3>
                        <p>No verified heroes found</p>
                    </div>
                `;
                return;
            }

            container.className = '';
            container.innerHTML = heroes.map(hero => renderHeroCard(hero)).join('');

            // Add drop event listeners
            document.querySelectorAll('.hero-card').forEach(card => {
                card.addEventListener('dragover', handleDragOver);
                card.addEventListener('dragleave', handleDragLeave);
                card.addEventListener('drop', handleDrop);
            });
        }

        // Render hero card
        function renderHeroCard(hero) {
            const initials = hero.name.split(' ').map(n => n[0]).join('');
            
            return `
                <div class="hero-card" data-hero-id="${hero.id}">
                    <div class="hero-header">
                        <div class="hero-avatar">${initials}</div>
                        <div class="hero-info">
                            <div class="hero-name">${hero.name}</div>
                            <div class="hero-rating">⭐ ${(hero.rating_avg || 0).toFixed(1)} (${hero.rating_count || 0} reviews)</div>
                        </div>
                    </div>
                    <div class="hero-stats">
                        <div class="hero-stat">
                            <strong>Status:</strong> ${hero.status}
                        </div>
                        <div class="hero-stat">
                            <strong>Skills:</strong> ${(hero.skills || []).length}
                        </div>
                    </div>
                </div>
            `;
        }

        // Drag and drop handlers
        let draggedJobId = null;

        function handleDragStart(e) {
            draggedJobId = e.target.dataset.jobId;
            e.target.classList.add('dragging');
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.currentTarget.classList.add('drag-over');
        }

        function handleDragLeave(e) {
            e.currentTarget.classList.remove('drag-over');
        }

        async function handleDrop(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');

            const heroId = e.currentTarget.dataset.heroId;
            
            if (!draggedJobId || !heroId) return;

            await assignJob(draggedJobId, heroId);
            draggedJobId = null;
        }

        // Assign job to hero
        async function assignJob(jobId, heroId) {
            try {
                const { error } = await supabase
                    .from('bookings')
                    .update({ 
                        hero_id: heroId,
                        status: 'awaiting_hero_accept'
                    })
                    .eq('id', jobId);

                if (error) throw error;

                // Status history is automatically created by the booking_status_change trigger
                showToast('Job assigned successfully!', 'success');
                await loadJobs();
            } catch (error) {
                console.error('Error assigning job:', error);
                showToast('Error assigning job: ' + error.message, 'error');
            }
        }

        // Unassign job
        async function unassignJob(jobId) {
            if (!confirm('Are you sure you want to unassign this job?')) return;

            try {
                const { error } = await supabase
                    .from('bookings')
                    .update({ 
                        hero_id: null,
                        status: 'requested'
                    })
                    .eq('id', jobId);

                if (error) throw error;

                // Status history is automatically created by the booking_status_change trigger
                showToast('Job unassigned successfully!', 'success');
                await loadJobs();
            } catch (error) {
                console.error('Error unassigning job:', error);
                showToast('Error unassigning job: ' + error.message, 'error');
            }
        }

        // Update stats
        function updateStats() {
            const unassigned = jobs.filter(j => !j.hero_id).length;
            const assigned = jobs.filter(j => j.hero_id).length;
            
            document.getElementById('unassignedCount').textContent = unassigned;
            document.getElementById('assignedCount').textContent = assigned;
            document.getElementById('heroCount').textContent = heroes.length;
        }

        // Show toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} active`;
            setTimeout(() => {
                toast.classList.remove('active');
            }, 3000);
        }

        // Initialize on load
        init();

        // Auto-refresh every 30 seconds
        setInterval(() => {
            loadJobs();
        }, 30000);
    </script>
</body>
</html>
